title: MotoGP
views:
  - title: MotoGP
    path: motogp
    icon: mdi:motorbike
    cards:
      # --- Next event: circuit data + full weekend schedule (all three classes) ---
      - type: markdown
        title: MotoGP Next Event
        content: |
          {% set s = 'sensor.motogp_next_event' %}
          {% set name = state_attr(s, 'name') %}
          {% if name is none %}
          _No upcoming Grand Prix found._
          {% else %}
          {% set ci = state_attr(s, 'circuit_info') or {} %}
          {% set labels = {'MGP': '🏍️ MotoGP', 'MT2': '🏍️ Moto2', 'MT3': '🏍️ Moto3'} %}
          {% set flags = {
            'GB': '🇬🇧', 'ES': '🇪🇸', 'IT': '🇮🇹', 'FR': '🇫🇷', 'DE': '🇩🇪', 'NL': '🇳🇱',
            'AT': '🇦🇹', 'PT': '🇵🇹', 'JP': '🇯🇵', 'TH': '🇹🇭', 'MY': '🇲🇾', 'AU': '🇦🇺',
            'AR': '🇦🇷', 'US': '🇺🇸', 'QA': '🇶🇦', 'ID': '🇮🇩', 'IN': '🇮🇳', 'FI': '🇫🇮',
            'CZ': '🇨🇿', 'HU': '🇭🇺', 'SA': '🇸🇦', 'AE': '🇦🇪', 'TR': '🇹🇷', 'BR': '🇧🇷'
          } %}
          {% set flag = flags.get((ci.get('country_code') or '') | upper, '🏁') %}
          {% set days = state_attr(s, 'days_until') %}
          {% if days is none %}{% set countdown = '' %}
          {% elif days < 0 %}{% set countdown = '🔴 Race weekend under way' %}
          {% elif days == 0 %}{% set countdown = '🏁 Starts today' %}
          {% elif days == 1 %}{% set countdown = '🏁 In 1 day' %}
          {% else %}{% set countdown = '🏁 In ' ~ days ~ ' days' %}{% endif %}
          ## {{ flag }} {{ name | upper }}
          📍 {{ state_attr(s, 'city') }}{% if ci.get('country') %}, {{ ci.get('country') }}{% endif %}{% if countdown %} &nbsp;·&nbsp; {{ countdown }}{% endif %}

          🗓️ **{{ as_timestamp(state_attr(s, 'date_start')) | timestamp_custom('%a %d %b') }} – {{ as_timestamp(state_attr(s, 'date_end')) | timestamp_custom('%a %d %b') }}**

          ### 🏟️ {{ state_attr(s, 'circuit') }}
          {% set stats = [] %}
          {% if ci.get('length_km') %}{% set stats = stats + ['**Length:** ' ~ ci.get('length_km') ~ ' km'] %}{% endif %}
          {% if ci.get('corners') %}{% set stats = stats + ['**Corners:** ' ~ ci.get('corners') ~ ' (' ~ (ci.get('left_corners') or 0) ~ 'L / ' ~ (ci.get('right_corners') or 0) ~ 'R)'] %}{% endif %}
          {% if ci.get('longest_straight_m') %}{% set stats = stats + ['**Longest straight:** ' ~ ci.get('longest_straight_m') ~ ' m'] %}{% endif %}
          {% if ci.get('width_m') %}{% set stats = stats + ['**Width:** ' ~ ci.get('width_m') ~ ' m'] %}{% endif %}
          {% if ci.get('designer') %}{% set stats = stats + ['**Designer:** ' ~ ci.get('designer')] %}{% endif %}
          {% if ci.get('constructed') %}{% set stats = stats + ['**Built:** ' ~ ci.get('constructed')] %}{% endif %}
          {% if stats %}{{ stats | join(' &nbsp;·&nbsp; ') }}{% else %}_No circuit details available._{% endif %}

          ### 📅 Weekend schedule
          {% set schedule = state_attr(s, 'schedule') or [] %}
          {% if schedule %}
          {% set ns = namespace(day='', lines=[]) %}
          {% for x in schedule %}
          {% set day = as_timestamp(x.start) | timestamp_custom('%A %-d %B') %}
          {% if day != ns.day %}
          {% set ns.day = day %}
          {% set ns.lines = ns.lines + ['', '**' ~ day ~ '**', '', '| Time | Class | Session |', '|:----:|:------|:--------|'] %}
          {% endif %}
          {% set marker = '🏁 ' if x.kind == 'RACE' else ('⚡ ' if x.kind == 'SPRINT' else '') %}
          {% set ns.lines = ns.lines + ['| `' ~ (as_timestamp(x.start) | timestamp_custom('%H:%M')) ~ '` | ' ~ labels.get(x['class'], x['class']) ~ ' | ' ~ marker ~ x.session ~ ' |'] %}
          {% endfor %}
          {{ ns.lines | join('\n') }}
          {% else %}
          _Schedule not available yet._
          {% endif %}
          {% endif %}

      # --- Championship standings (top 5) for each class ---
      - type: horizontal-stack
        cards:
          - type: markdown
            content: |
              ### 🏆 MotoGP
              | # | Rider | Pts |
              |:--:|:--|--:|
              {% for r in state_attr('sensor.motogp_motogp_standings', 'standings') or [] %}
              | {{ r.position }} | {{ r.rider }} | **{{ r.points }}** |
              {% endfor %}
          - type: markdown
            content: |
              ### 🥈 Moto2
              | # | Rider | Pts |
              |:--:|:--|--:|
              {% for r in state_attr('sensor.motogp_moto2_standings', 'standings') or [] %}
              | {{ r.position }} | {{ r.rider }} | **{{ r.points }}** |
              {% endfor %}
          - type: markdown
            content: |
              ### 🥉 Moto3
              | # | Rider | Pts |
              |:--:|:--|--:|
              {% for r in state_attr('sensor.motogp_moto3_standings', 'standings') or [] %}
              | {{ r.position }} | {{ r.rider }} | **{{ r.points }}** |
              {% endfor %}

      # --- Latest race podium for each class ---
      - type: horizontal-stack
        cards:
          - type: markdown
            content: |
              ### 🏁 MotoGP
              {% set medals = {1: '🥇', 2: '🥈', 3: '🥉'} %}
              _{{ state_attr('sensor.motogp_motogp_latest_result', 'event') }}_

              {% for r in state_attr('sensor.motogp_motogp_latest_result', 'podium') or [] %}
              - {{ medals[r.position] }} **{{ r.rider }}**
              {% endfor %}
          - type: markdown
            content: |
              ### 🏁 Moto2
              {% set medals = {1: '🥇', 2: '🥈', 3: '🥉'} %}
              _{{ state_attr('sensor.motogp_moto2_latest_result', 'event') }}_

              {% for r in state_attr('sensor.motogp_moto2_latest_result', 'podium') or [] %}
              - {{ medals[r.position] }} **{{ r.rider }}**
              {% endfor %}
          - type: markdown
            content: |
              ### 🏁 Moto3
              {% set medals = {1: '🥇', 2: '🥈', 3: '🥉'} %}
              _{{ state_attr('sensor.motogp_moto3_latest_result', 'event') }}_

              {% for r in state_attr('sensor.motogp_moto3_latest_result', 'podium') or [] %}
              - {{ medals[r.position] }} **{{ r.rider }}**
              {% endfor %}

      # --- Full season calendar ---
      - type: calendar
        title: MotoGP calendar
        initial_view: listWeek
        entities:
          - calendar.motogp_calendar
