type: markdown
title: MotoGP Next Event
content: |
  {% set s = 'sensor.motogp_next_event' %}
  {% set name = state_attr(s, 'name') %}
  {% if name is none %}
  _No upcoming Grand Prix found._
  {% else %}
  {% set ci = state_attr(s, 'circuit_info') or {} %}
  {% set labels = {'MGP': 'рҹҸҚпёҸ MotoGP', 'MT2': 'рҹҸҚпёҸ Moto2', 'MT3': 'рҹҸҚпёҸ Moto3'} %}
  {% set flags = {
    'GB': 'рҹҮ¬рҹҮ§', 'ES': 'рҹҮӘрҹҮё', 'IT': 'рҹҮ®рҹҮ№', 'FR': 'рҹҮ«рҹҮ·', 'DE': 'рҹҮ©рҹҮӘ', 'NL': 'рҹҮірҹҮұ',
    'AT': 'рҹҮҰрҹҮ№', 'PT': 'рҹҮөрҹҮ№', 'JP': 'рҹҮҜрҹҮө', 'TH': 'рҹҮ№рҹҮӯ', 'MY': 'рҹҮІрҹҮҫ', 'AU': 'рҹҮҰрҹҮә',
    'AR': 'рҹҮҰрҹҮ·', 'US': 'рҹҮәрҹҮё', 'QA': 'рҹҮ¶рҹҮҰ', 'ID': 'рҹҮ®рҹҮ©', 'IN': 'рҹҮ®рҹҮі', 'FI': 'рҹҮ«рҹҮ®',
    'CZ': 'рҹҮЁрҹҮҝ', 'HU': 'рҹҮӯрҹҮә', 'SA': 'рҹҮёрҹҮҰ', 'AE': 'рҹҮҰрҹҮӘ', 'TR': 'рҹҮ№рҹҮ·', 'BR': 'рҹҮ§рҹҮ·'
  } %}
  {% set flag = flags.get((ci.get('country_code') or '') | upper, 'рҹҸҒ') %}
  {% set days = state_attr(s, 'days_until') %}
  {% if days is none %}{% set countdown = '' %}
  {% elif days < 0 %}{% set countdown = 'рҹ”ҙ Race weekend under way' %}
  {% elif days == 0 %}{% set countdown = 'рҹҸҒ Starts today' %}
  {% elif days == 1 %}{% set countdown = 'рҹҸҒ In 1 day' %}
  {% else %}{% set countdown = 'рҹҸҒ In ' ~ days ~ ' days' %}{% endif %}
  ## {{ flag }} {{ name | upper }}
  рҹ“Қ {{ state_attr(s, 'city') }}{% if ci.get('country') %}, {{ ci.get('country') }}{% endif %}{% if countdown %} &nbsp;В·&nbsp; {{ countdown }}{% endif %}

  рҹ—“пёҸ **{{ as_timestamp(state_attr(s, 'date_start')) | timestamp_custom('%a %d %b') }} вҖ“ {{ as_timestamp(state_attr(s, 'date_end')) | timestamp_custom('%a %d %b') }}**

  ### рҹҸҹпёҸ {{ state_attr(s, 'circuit') }}
  {% set stats = [] %}
  {% if ci.get('length_km') %}{% set stats = stats + ['**Length:** ' ~ ci.get('length_km') ~ ' km'] %}{% endif %}
  {% if ci.get('corners') %}{% set stats = stats + ['**Corners:** ' ~ ci.get('corners') ~ ' (' ~ (ci.get('left_corners') or 0) ~ 'L / ' ~ (ci.get('right_corners') or 0) ~ 'R)'] %}{% endif %}
  {% if ci.get('longest_straight_m') %}{% set stats = stats + ['**Longest straight:** ' ~ ci.get('longest_straight_m') ~ ' m'] %}{% endif %}
  {% if ci.get('width_m') %}{% set stats = stats + ['**Width:** ' ~ ci.get('width_m') ~ ' m'] %}{% endif %}
  {% if ci.get('designer') %}{% set stats = stats + ['**Designer:** ' ~ ci.get('designer')] %}{% endif %}
  {% if ci.get('constructed') %}{% set stats = stats + ['**Built:** ' ~ ci.get('constructed')] %}{% endif %}
  {% if stats %}{{ stats | join(' &nbsp;В·&nbsp; ') }}{% else %}_No circuit details available._{% endif %}
  {% if ci.get('track_map') %}

  ![Circuit layout]({{ ci.get('track_map') }})
  {% endif %}

  ### рҹ“… Weekend schedule
  {% set schedule = state_attr(s, 'schedule') or [] %}
  {% if schedule %}
  {% set ns = namespace(day='', lines=[]) %}
  {% for x in schedule %}
  {% set day = as_timestamp(x.start) | timestamp_custom('%A %-d %B') %}
  {% if day != ns.day %}
  {% set ns.day = day %}
  {% set ns.lines = ns.lines + ['', '**' ~ day ~ '**', '', '| Time | Class | Session |', '|:----:|:------|:--------|'] %}
  {% endif %}
  {% set marker = 'рҹҸҒ ' if x.kind == 'RACE' else ('вҡЎ ' if x.kind == 'SPRINT' else '') %}
  {% set ns.lines = ns.lines + ['| `' ~ (as_timestamp(x.start) | timestamp_custom('%H:%M')) ~ '` | ' ~ labels.get(x['class'], x['class']) ~ ' | ' ~ marker ~ x.session ~ ' |'] %}
  {% endfor %}
  {{ ns.lines | join('\n') }}
  {% else %}
  _Schedule not available yet._
  {% endif %}
  {% endif %}
